name: Build Holo
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build app
        run: |
          xcodebuild -project Holo.xcodeproj -scheme Holo -configuration Release \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_ALLOWED=YES \
            -derivedDataPath build build
            - name: Re-sign app consistently
        run: |
          codesign --force --deep --sign - build/Build/Products/Release/Holo.app
      - name: Zip app
        run: |
          cd build/Build/Products/Release
          ditto -c -k --keepParent Holo.app Holo.app.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Holo-app
          path: build/Build/Products/Release/Holo.app.zip
